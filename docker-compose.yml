version: "3.9"

services:
  bot:
    build: .
    container_name: pro_music_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - bot-network

  redis:
    image: redis:7-alpine
    container_name: pro_music_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
